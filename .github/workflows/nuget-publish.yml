name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (without v prefix). Leave empty to auto-bump from latest tag.'
        required: false
      force_publish:
        description: 'Force publish even when the Must-Publish gate sees no source/test/workflow changes.'
        required: false
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  CI: true

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          fetch-tags: true
      - id: ver
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            BASE_MAJOR=1
            BASE_MINOR=10
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [[ "$LATEST_TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              MAJOR=${BASH_REMATCH[1]}
              MINOR=${BASH_REMATCH[2]}
              PATCH=${BASH_REMATCH[3]}
              if (( MAJOR < BASE_MAJOR || (MAJOR == BASE_MAJOR && MINOR < BASE_MINOR) )); then
                VERSION="$BASE_MAJOR.$BASE_MINOR.0"
              elif git tag --points-at HEAD | grep -qFx "$LATEST_TAG"; then
                VERSION="$MAJOR.$MINOR.$PATCH"
              else
                PATCH=$((PATCH + 1))
                VERSION="$MAJOR.$MINOR.$PATCH"
              fi
            else
              VERSION="1.10.0"
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json
      - name: Restore
        run: dotnet restore ANcpLua.Agents.slnx
      - name: Build
        run: dotnet build ANcpLua.Agents.slnx -c Release --no-restore -p:Version=${{ needs.version.outputs.version }}
      - name: Test
        run: dotnet test --project tests/ANcpLua.Agents.Tests/ANcpLua.Agents.Tests.csproj -c Release --no-restore --no-build
      - name: Pack
        if: matrix.os == 'ubuntu-latest'
        run: |
          dotnet pack src/ANcpLua.Agents/ANcpLua.Agents.csproj -c Release -o artifacts -p:Version=${{ needs.version.outputs.version }} --no-build
          dotnet pack src/ANcpLua.Agents.Instrumentation/ANcpLua.Agents.Instrumentation.csproj -c Release -o artifacts -p:Version=${{ needs.version.outputs.version }} --no-build
          dotnet pack src/ANcpLua.Agents.Hosting.ServiceDefaults/ANcpLua.Agents.Hosting.ServiceDefaults.csproj -c Release -o artifacts -p:Version=${{ needs.version.outputs.version }} --no-build
          dotnet pack src/ANcpLua.Agents.Workflows/ANcpLua.Agents.Workflows.csproj -c Release -o artifacts -p:Version=${{ needs.version.outputs.version }} --no-build
          dotnet pack src/ANcpLua.Agents.Workflows.Declarative/ANcpLua.Agents.Workflows.Declarative.csproj -c Release -o artifacts -p:Version=${{ needs.version.outputs.version }} --no-build
          dotnet pack src/ANcpLua.Agents.Testing/ANcpLua.Agents.Testing.csproj -c Release -o artifacts -p:Version=${{ needs.version.outputs.version }} --no-build
          dotnet pack src/ANcpLua.Agents.Testing.Workflows/ANcpLua.Agents.Testing.Workflows.csproj -c Release -o artifacts -p:Version=${{ needs.version.outputs.version }} --no-build
      - name: Upload artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: packages
          path: artifacts/*.nupkg
          if-no-files-found: error

  publish:
    needs: [version, build]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: nuget
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Must Publish Packages
        id: has_changes
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ github.event.inputs.force_publish }}" == "true" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            COMPARE_TAG="$LATEST_TAG"
            if git tag --points-at HEAD | grep -qFx "$LATEST_TAG"; then
              COMPARE_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            fi
            if [ -z "$COMPARE_TAG" ]; then
              echo "has_changes=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            # Version.props / Directory.Packages.props drive the shipped nuspec's dependency
            # versions — a dep bump with no src/ change must still publish.
            CHANGES=$(git diff --name-only "$COMPARE_TAG" HEAD -- 'src/**' 'tests/**' 'samples/**' 'Version.props' 'Directory.Packages.props' '.github/workflows/nuget-publish.yml' || true)
            if [ -n "$CHANGES" ]; then
              echo "$CHANGES"
              echo "has_changes=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_changes=false" >> "$GITHUB_OUTPUT"
            fi
          fi
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        if: steps.has_changes.outputs.has_changes == 'true'
        with:
          name: packages
          path: artifacts/
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        if: steps.has_changes.outputs.has_changes == 'true'
      - name: Authenticate to NuGet
        if: steps.has_changes.outputs.has_changes == 'true'
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        with:
          user: ANcpLua
      - name: Push to NuGet
        if: steps.has_changes.outputs.has_changes == 'true'
        run: |
          for pkg in artifacts/*.nupkg; do
            dotnet nuget push "$pkg" \
              --source https://api.nuget.org/v3/index.json \
              --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
              --skip-duplicate
          done
      - name: Create GitHub release
        if: steps.has_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          TAG="v${VERSION}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping"
          else
            gh release create "$TAG" --generate-notes --title "$TAG"
          fi
