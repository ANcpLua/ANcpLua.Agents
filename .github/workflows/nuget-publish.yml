name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without v prefix)'
        required: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  CI: true

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      is_release: ${{ steps.ver.outputs.is_release }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - id: ver
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            COMMITS=$(git rev-list --count HEAD)
            SHA=$(git rev-parse --short HEAD)
            echo "version=0.0.$COMMITS-ci.g$SHA" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

  # Build on both Linux and Windows to catch platform-specific issues early.
  # Pack/upload only from Linux to avoid duplicate artifacts.
  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json
      - name: Restore
        run: dotnet restore ANcpLua.Agents.slnx
      - name: Build
        run: dotnet build ANcpLua.Agents.slnx -c Release --no-restore -p:Version=${{ needs.version.outputs.version }}

      # Runtime helpers — no MAF prerelease deps, packs stable.
      - name: Pack (stable)
        if: matrix.os == 'ubuntu-latest'
        run: dotnet pack src/ANcpLua.Agents/ANcpLua.Agents.csproj -c Release -o artifacts -p:Version=${{ needs.version.outputs.version }} --no-build

      # Both test packages pull MAF prereleases:
      #   .Testing         → Microsoft.Agents.AI.Hosting.AGUI.AspNetCore 1.0.0-preview.*
      #   .Testing.Workflows → Microsoft.Agents.AI.Workflows.Declarative 1.0.0-rc6
      #                       + transitive AGUI via ProjectReference to .Testing
      # NU5104 forbids stable packages from depending on prerelease. Append
      # -preview.1 suffix so both ship on prerelease feeds until upstream MAF
      # ships these two transitives as stable.
      - name: Pack (test packages — preview)
        if: matrix.os == 'ubuntu-latest'
        run: |
          dotnet pack src/ANcpLua.Agents.Testing/ANcpLua.Agents.Testing.csproj -c Release -o artifacts -p:Version=${{ needs.version.outputs.version }}-preview.1 --no-build
          dotnet pack src/ANcpLua.Agents.Testing.Workflows/ANcpLua.Agents.Testing.Workflows.csproj -c Release -o artifacts -p:Version=${{ needs.version.outputs.version }}-preview.1 --no-build

      - name: Upload artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: packages
          path: artifacts/*.nupkg
          if-no-files-found: error

  # Publish on tagged releases or workflow_dispatch. The `nuget` environment gates with manual
  # approval and holds the trusted-publishing config.
  #
  # Trusted publishing setup (one-time, per package):
  #   1. Visit https://www.nuget.org/account/trustedpublishing
  #   2. For each ANcpLua.Agents* package owned by ANcpLua, add a GitHub policy
  #      pointing at this repo + workflow file (`nuget-publish.yml`) + environment (`nuget`).
  #   3. No NUGET_API_KEY secret required — OIDC handles auth.
  publish:
    needs: [version, build]
    if: needs.version.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    environment: nuget
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: packages
          path: artifacts/
      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5

      - name: Authenticate to NuGet (trusted publishing)
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        with:
          user: ANcpLua

      - name: Push to NuGet
        run: |
          for pkg in artifacts/*.nupkg; do
            dotnet nuget push "$pkg" \
              --source https://api.nuget.org/v3/index.json \
              --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
              --skip-duplicate
          done

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          TAG="v${VERSION}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping"
          else
            gh release create "$TAG" --generate-notes --title "$TAG"
          fi
