syntax = "proto3";

option csharp_namespace = "ANcpLua.Agents.Hosting.AGUI.Durable.Grpc";

package ancplua.agents.streaming.v1;

// Server-streaming surface for live updates emitted by a durable agent's
// IAgentResponseHandler. Pairs with DurableAgentStreamRegistry: the gRPC
// service reads from the same per-session Channel<AgentResponseUpdate> that
// the orchestration-worker-side ChannelAgentResponseHandler writes into.
service AgentStream {
  rpc Subscribe(SubscribeRequest) returns (stream AgentUpdateMessage);
}

message SubscribeRequest {
  // AgentSessionId in string form ("agentName@sessionKey") — must match the
  // key under which the orchestration writes updates to the registry.
  string session_key = 1;
}

message AgentUpdateMessage {
  string message_id = 1;
  string author_name = 2;
  string role = 3;
  string text = 4;
  string response_id = 5;
}
